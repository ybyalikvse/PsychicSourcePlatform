name: Horoscope Generation

on:
  schedule:
    # Daily at 10:00 UTC (5:00 AM ET during EDT)
    - cron: "0 10 * * *"
    # Weekly on Monday at 10:00 UTC
    - cron: "0 10 * * 1"
    # Monthly on 1st at 10:00 UTC
    - cron: "0 10 1 * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Horoscope type to generate"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  determine-type:
    runs-on: ubuntu-latest
    outputs:
      horoscope_type: ${{ steps.type.outputs.type }}
    steps:
      - name: Determine horoscope type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 10 1 * *" ]; then
              echo "type=monthly" >> $GITHUB_OUTPUT
            elif [ "$CRON" = "0 10 * * 1" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
            else
              echo "type=daily" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Horoscope type: $(cat $GITHUB_OUTPUT)"

  generate:
    needs: determine-type
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        site: [psychicsource, pathforward]
        language: [en, es]
        sign:
          - Aries
          - Taurus
          - Gemini
          - Cancer
          - Leo
          - Virgo
          - Libra
          - Scorpio
          - Sagittarius
          - Capricorn
          - Aquarius
          - Pisces
    env:
      HOROSCOPE_TYPE: ${{ needs.determine-type.outputs.horoscope_type }}
    steps:
      - name: Generate ${{ matrix.sign }} (${{ matrix.language }}/${{ matrix.site }}) - ${{ needs.determine-type.outputs.horoscope_type }}
        run: |
          echo "Type: $HOROSCOPE_TYPE"

          if [ "$HOROSCOPE_TYPE" = "daily" ]; then
            for DAYS_AHEAD in 0 1 2 3; do
              echo "Generating ${{ matrix.sign }} (${{ matrix.language }}/${{ matrix.site }}) +${DAYS_AHEAD} days..."
              HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 280 -L \
                -X POST "${{ secrets.VERCEL_APP_URL }}/api/horoscopes/generate-sign" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"daily\",\"language\":\"${{ matrix.language }}\",\"sign\":\"${{ matrix.sign }}\",\"site\":\"${{ matrix.site }}\",\"daysAhead\":${DAYS_AHEAD}}")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  ✓ Success"
              else
                echo "  ✗ Failed (HTTP $HTTP_CODE): $(cat /tmp/response.json)"
              fi
              sleep 2
            done
          else
            echo "Generating ${{ matrix.sign }} (${{ matrix.language }}/${{ matrix.site }}) - $HOROSCOPE_TYPE..."
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 280 -L \
              -X POST "${{ secrets.VERCEL_APP_URL }}/api/horoscopes/generate-sign" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"${HOROSCOPE_TYPE}\",\"language\":\"${{ matrix.language }}\",\"sign\":\"${{ matrix.sign }}\",\"site\":\"${{ matrix.site }}\"}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✓ Success"
            else
              echo "  ✗ Failed (HTTP $HTTP_CODE): $(cat /tmp/response.json)"
            fi
          fi
