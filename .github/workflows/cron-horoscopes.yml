name: Horoscope Generation

on:
  schedule:
    # Daily at 10:00 UTC (5:00 AM ET during EDT)
    - cron: "0 10 * * *"
    # Weekly on Monday at 10:00 UTC
    - cron: "0 10 * * 1"
    # Monthly on 1st at 10:00 UTC
    - cron: "0 10 1 * *"
  workflow_dispatch:
    inputs:
      type:
        description: "Horoscope type to generate"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Determine horoscope type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 10 1 * *" ]; then
              echo "type=monthly" >> $GITHUB_OUTPUT
            elif [ "$CRON" = "0 10 * * 1" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
            else
              echo "type=daily" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Trigger horoscope generation
        run: |
          curl -f -X GET \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/horoscopes?type=${{ steps.type.outputs.type }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
