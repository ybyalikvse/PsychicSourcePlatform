name: Video Cleanup

on:
  schedule:
    # Daily at 8am UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger video cleanup
        run: |
          curl -f -X GET \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/video-cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
