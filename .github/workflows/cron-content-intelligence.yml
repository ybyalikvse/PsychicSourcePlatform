name: Content Intelligence Pipeline

on:
  schedule:
    # Daily at 10:00 UTC (5:00 AM ET) — scrape, transcripts, analyze, brief, scripts
    - cron: "0 10 * * *"
    # Weekly Monday at 09:00 UTC (4:00 AM ET) — performance report (runs before daily pipeline)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - scrape
          - transcripts
          - analyze
          - brief
          - scripts
          - performance

env:
  APP_URL: ${{ secrets.VERCEL_APP_URL }}
  AUTH: "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

jobs:
  # Step 0: Performance feedback on last week's content (weekly Monday only, or manual)
  performance:
    if: ${{ github.event.inputs.step == 'full' || github.event.inputs.step == 'performance' || (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1') }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate performance report
        run: |
          echo "Generating performance report..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
            -X POST "${APP_URL}/api/ci/pipeline/performance-report" \
            -H "Content-Type: application/json" \
            -H "${AUTH}")
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json | head -c 500
          echo ""

  # Step 1: Scrape each active competitor
  setup-scrape:
    needs: [performance]
    if: always() && (github.event.inputs.step == 'full' || github.event.inputs.step == 'scrape' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      competitors: ${{ steps.fetch.outputs.competitors }}
    steps:
      - name: Fetch active competitors
        id: fetch
        run: |
          RESPONSE=$(curl -s -L "${APP_URL}/api/ci/competitors?active=true")
          COMPETITORS=$(echo "$RESPONSE" | jq -c '[.[].id]' 2>/dev/null || echo '[]')
          echo "competitors=$COMPETITORS" >> $GITHUB_OUTPUT
          echo "Found competitors: $COMPETITORS"

  scrape:
    needs: setup-scrape
    if: ${{ needs.setup-scrape.outputs.competitors != '[]' && needs.setup-scrape.outputs.competitors != '' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        competitorId: ${{ fromJson(needs.setup-scrape.outputs.competitors) }}
    steps:
      - name: Scrape competitor ${{ matrix.competitorId }}
        run: |
          echo "Scraping ${{ matrix.competitorId }}..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
            -X POST "${APP_URL}/api/ci/pipeline/scrape" \
            -H "Content-Type: application/json" \
            -H "${AUTH}" \
            -d '{"competitorId": "${{ matrix.competitorId }}"}')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ Success"
          else
            echo "  ✗ Failed (HTTP $HTTP_CODE): $(cat /tmp/response.json)"
          fi

  # Step 2-3: Fetch transcripts for pending videos
  setup-transcripts:
    needs: scrape
    if: always() && (github.event.inputs.step == 'full' || github.event.inputs.step == 'transcripts' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      videos: ${{ steps.fetch.outputs.videos }}
    steps:
      - name: Fetch videos needing transcripts
        id: fetch
        run: |
          RESPONSE=$(curl -s -L "${APP_URL}/api/ci/videos?transcriptStatus=pending&fields=id")
          VIDEOS=$(echo "$RESPONSE" | jq -c '[.[].id]' 2>/dev/null || echo '[]')
          # Limit to 50 per run to avoid excessive API usage
          VIDEOS=$(echo "$VIDEOS" | jq -c '.[0:50]')
          echo "videos=$VIDEOS" >> $GITHUB_OUTPUT
          echo "Found $(echo "$VIDEOS" | jq length) videos needing transcripts"

  transcripts:
    needs: setup-transcripts
    if: always() && needs.setup-transcripts.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch all pending transcripts
        run: |
          VIDEOS='${{ needs.setup-transcripts.outputs.videos }}'
          COUNT=$(echo "$VIDEOS" | jq length 2>/dev/null || echo 0)
          echo "Total videos needing transcripts: $COUNT"

          for i in $(seq 0 $(($COUNT - 1))); do
            VIDEO_ID=$(echo "$VIDEOS" | jq -r ".[$i]")
            echo "Fetching transcript for $VIDEO_ID ($((i+1))/$COUNT)..."
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
              -X POST "${APP_URL}/api/ci/pipeline/transcript" \
              -H "Content-Type: application/json" \
              -H "${AUTH}" \
              -d "{\"videoId\": \"$VIDEO_ID\"}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✓ Success"
            else
              echo "  ✗ Failed (HTTP $HTTP_CODE)"
            fi
            sleep 1
          done

  # Step 4: AI analyze each video
  setup-analyze:
    needs: transcripts
    if: always() && (github.event.inputs.step == 'full' || github.event.inputs.step == 'analyze' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      videos: ${{ steps.fetch.outputs.videos }}
    steps:
      - name: Fetch videos needing analysis
        id: fetch
        run: |
          RESPONSE=$(curl -s -L "${APP_URL}/api/ci/videos?analysisStatus=pending&transcriptStatus=completed&fields=id")
          VIDEOS=$(echo "$RESPONSE" | jq -c '[.[].id]' 2>/dev/null || echo '[]')
          echo "videos=$VIDEOS" >> $GITHUB_OUTPUT
          echo "Found $(echo "$VIDEOS" | jq length) videos needing analysis"

  analyze:
    needs: setup-analyze
    if: always() && needs.setup-analyze.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Analyze all pending videos
        run: |
          VIDEOS='${{ needs.setup-analyze.outputs.videos }}'
          echo "Videos to analyze: $VIDEOS"
          COUNT=$(echo "$VIDEOS" | jq length 2>/dev/null || echo 0)
          echo "Total: $COUNT"

          for i in $(seq 0 $(($COUNT - 1))); do
            VIDEO_ID=$(echo "$VIDEOS" | jq -r ".[$i]")
            echo "Analyzing video $VIDEO_ID ($((i+1))/$COUNT)..."
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
              -X POST "${APP_URL}/api/ci/pipeline/analyze" \
              -H "Content-Type: application/json" \
              -H "${AUTH}" \
              -d "{\"videoId\": \"$VIDEO_ID\"}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✓ Success"
            else
              echo "  ✗ Failed (HTTP $HTTP_CODE): $(cat /tmp/response.json | head -c 200)"
            fi
            sleep 3
          done

  # Step 5a: Fetch distinct pending topics to fan out per-topic brief generation
  setup-brief:
    needs: analyze
    if: always() && (github.event.inputs.step == 'full' || github.event.inputs.step == 'brief' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    outputs:
      topics: ${{ steps.fetch.outputs.topics }}
    steps:
      - name: Fetch pending brief topics
        id: fetch
        run: |
          RESPONSE=$(curl -s -L -H "${AUTH}" "${APP_URL}/api/ci/pipeline/brief-topics")
          TOPICS=$(echo "$RESPONSE" | jq -c '.' 2>/dev/null || echo '[]')
          echo "topics=$TOPICS" >> $GITHUB_OUTPUT
          echo "Found topics: $TOPICS"

  # Step 5b: Generate brief for each topic in parallel
  brief:
    needs: setup-brief
    if: always() && needs.setup-brief.result == 'success' && needs.setup-brief.outputs.topics != '[]' && needs.setup-brief.outputs.topics != ''
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        topic: ${{ fromJson(needs.setup-brief.outputs.topics) }}
    steps:
      - name: Generate brief for topic "${{ matrix.topic }}"
        run: |
          echo "Generating brief for topic: ${{ matrix.topic }}"
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
            -X POST "${APP_URL}/api/ci/pipeline/generate-brief" \
            -H "Content-Type: application/json" \
            -H "${AUTH}" \
            -d "{\"topicCategory\": $(echo '${{ matrix.topic }}' | jq -Rs .)}")
          if [ "$HTTP_CODE" = "200" ]; then
            BRIEFS=$(cat /tmp/response.json | jq '.briefs | length' 2>/dev/null || echo 0)
            VIDEOS=$(cat /tmp/response.json | jq '.videosProcessed' 2>/dev/null || echo 0)
            echo "  ✓ $BRIEFS brief(s) generated from $VIDEOS videos"
          else
            echo "  ✗ Failed (HTTP $HTTP_CODE): $(cat /tmp/response.json | head -c 200)"
          fi

  # Step 6: Generate scripts from brief
  scripts:
    needs: brief
    if: always() && (github.event.inputs.step == 'full' || github.event.inputs.step == 'scripts' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        itemIndex: [0, 1, 2, 3, 4]
    steps:
      - name: Generate script for brief item ${{ matrix.itemIndex }}
        run: |
          # Get the latest brief ID
          BRIEFS=$(curl -s -L "${APP_URL}/api/ci/briefs")
          BRIEF_ID=$(echo "$BRIEFS" | jq -r '.[0].id // empty' 2>/dev/null)
          if [ -z "$BRIEF_ID" ]; then
            echo "No brief found, skipping"
            exit 0
          fi
          echo "Generating script for brief $BRIEF_ID, item ${{ matrix.itemIndex }}..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 295 -L \
            -X POST "${APP_URL}/api/ci/pipeline/generate-script" \
            -H "Content-Type: application/json" \
            -H "${AUTH}" \
            -d "{\"briefId\": \"$BRIEF_ID\", \"itemIndex\": ${{ matrix.itemIndex }}}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ Script generated"
          else
            echo "  ✗ Failed (HTTP $HTTP_CODE)"
          fi
          sleep 3
